; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = Micro-Node-Bootloader
boards_dir = ${platformio.packages_dir}/br-boards/boards

[env]
platform_packages = br-boards @ git+https://github.com/BeyondRobotix/br_platformio_hwdef.git
board_build.variants_dir = ${platformio.packages_dir}/br-boards/variants

[env:Micro-Node-Bootloader]
platform = ststm32
board = MicroNode
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
debug_build_flags = -O0 -g
debug_init_break = tbreak none
board_build.ldscript = ${platformio.packages_dir}/br-boards/variants/MicroNode/ldscript.ld
build_flags =
    -Wno-error=deprecated-declarations
    -DCANL431
    -DBOARD_FLASH_SIZE=256
extra_scripts = ${platformio.packages_dir}/br-boards/upload_bootloader_app.py


[env:Micro-Node-No-Bootloader]
platform = ststm32
board = MicroNode
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
debug_build_flags = -O0 -g
debug_init_break = tbreak none
board_build.ldscript = ${platformio.packages_dir}/br-boards/variants/MicroNode/ldscript-no-bootloader.ld
build_flags =
    -Wno-error=deprecated-declarations
    -DDISABLE_APP_SETUP
    -DCANL431
    -DBOARD_FLASH_SIZE=256


[env:Core-Node-No-Bootloader]
platform = ststm32
board = CoreNode
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
debug_build_flags = -O0 -g
debug_init_break = tbreak none
board_build.ldscript = ${platformio.packages_dir}/br-boards/variants/CoreNode/ldscript-no-bootloader.ld
build_flags =
    -Wno-error=deprecated-declarations
    -DDISABLE_APP_SETUP
    -DCANH7
    -DARDUINO_NUCLEO_H743ZI2
    -DACANFD
    -DBOARD_FLASH_SIZE=2048


[env:Micro-Node-Plus-No-Bootloader]
platform = ststm32
board = MicroNodePlus
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
debug_build_flags = -O0 -g
debug_init_break = tbreak none
board_build.ldscript = ${platformio.packages_dir}/br-boards/variants/MicroNodePlus/ldscript.ld
build_flags =
    -Wno-error=deprecated-declarations
    -DARDUINO_GENERIC_H723ZGTX
    -DARDUINO_NUCLEO_H723ZG
    -DACANFD
    -DBOARD_FLASH_SIZE=1024
